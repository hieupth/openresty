# ------------------------------------------------------
# Basic performance settings
# ------------------------------------------------------
# Enable sendfile for static file serving
sendfile on;
# Optimize sendfile for large files
tcp_nopush on;
tcp_nodelay on;
# Keepalive settings
keepalive_timeout 65;
types_hash_max_size 1024;

# ------------------------------------------------------
# Websocket configurations
# ------------------------------------------------------
# If Upgrade is defined, Connection = upgrade. If Upgrade is empty, Connection = close
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ------------------------------------------------------
# Client request settings
# ------------------------------------------------------
# Client settings
client_max_body_size 1m;
client_body_timeout 30s;
client_header_timeout 30s;
# Buffer sizes optimization
client_body_buffer_size 128k;
client_header_buffer_size 4k;
large_client_header_buffers 4 16k;

# ------------------------------------------------------
# Gzip basic compression.
# ------------------------------------------------------
# Enable gzip for better performance and lower bandwidth.
gzip on;
gzip_comp_level    6;
gzip_min_length    256;
gzip_proxied       any;
gzip_vary          on;
# Zip almost static file types.
gzip_types
  application/atom+xml
  application/javascript
  application/json
  application/ld+json
  application/manifest+json
  application/rss+xml
  application/vnd.geo+json
  application/vnd.ms-fontobject
  application/x-font-ttf
  application/x-web-app-manifest+json
  application/xhtml+xml
  application/xml
  font/opentype
  image/bmp
  image/svg+xml
  image/x-icon
  text/cache-manifest
  text/css
  text/plain
  text/vcard
  text/vnd.rim.location.xloc
  text/vtt
  text/x-component
  text/x-cross-domain-policy;